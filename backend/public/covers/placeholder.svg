<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <!-- Book cover background -->
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E2B4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2D42;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main cover -->
  <rect width="300" height="450" fill="url(#bookGradient)"/>
  
  <!-- Spine effect -->
  <rect x="0" y="0" width="8" height="450" fill="#0a1420" opacity="0.5"/>
  
  <!-- Decorative pattern -->
  <circle cx="150" cy="225" r="80" fill="#D4AF37" opacity="0.15"/>
  <circle cx="150" cy="225" r="60" fill="#C9963A" opacity="0.1"/>
  
  <!-- Book icon -->
  <g transform="translate(150, 225)">
    <!-- Pages -->
    <rect x="-30" y="-50" width="60" height="100" fill="none" stroke="#FFF9F2" stroke-width="2"/>
    <line x1="-30" y1="-30" x2="30" y2="-30" stroke="#FFF9F2" stroke-width="1.5"/>
    <line x1="-30" y1="-10" x2="30" y2="-10" stroke="#FFF9F2" stroke-width="1.5"/>
    <line x1="-30" y1="10" x2="30" y2="10" stroke="#FFF9F2" stroke-width="1.5"/>
    <line x1="-30" y1="30" x2="30" y2="30" stroke="#FFF9F2" stroke-width="1.5"/>
  </g>
  
  <!-- Text -->
  <text x="150" y="400" font-family="serif" font-size="16" fill="#FFF9F2" text-anchor="middle" font-weight="bold">No Cover Available</text>
  
  <!-- Bottom decoration -->
  <rect x="40" y="420" width="220" height="2" fill="#D4AF37" opacity="0.6"/>
</svg>
